name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: shinhyeok22/pfas
  DEPLOY_DIR: ~/apps/pfas

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build boot jar
        run: ./gradlew --no-daemon bootJar

      - name: Smoke test packaged jar
        run: |
          export GG_JTE_DEVELOPMENT_MODE=false
          export GG_JTE_USE_PRECOMPILED_TEMPLATES=true
          java -jar build/libs/*.jar --server.port=18080 > build/jar-smoke.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 http://127.0.0.1:18080/healthz > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:18080/ > /dev/null
          curl -fsS http://127.0.0.1:18080/checker > /dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Copy compose file to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on OCI
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PFAS_INTERNAL_API_PASSWORD: ${{ secrets.PFAS_INTERNAL_API_PASSWORD }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,PFAS_INTERNAL_API_PASSWORD
          script_stop: true
          script: |
            mkdir -p ${{ env.DEPLOY_DIR }}/runtime/merchant-clicks
            mkdir -p ${{ env.DEPLOY_DIR }}/runtime/route-clicks

            {
              printf '%s\n' 'PFAS_SITE_BASE_URL=https://waternextstep.com'
              printf '%s\n' 'PFAS_INTERNAL_API_USERNAME=admin'
              printf 'PFAS_INTERNAL_API_PASSWORD=%s\n' "$PFAS_INTERNAL_API_PASSWORD"
              printf '%s\n' 'PFAS_SITE_EDITORIAL_OWNER=gabi Editorial Team'
              printf '%s\n' 'PFAS_SITE_METHODOLOGY_OWNER=gabi Water Evidence Team'
            } > ${{ env.DEPLOY_DIR }}/.env

            printf '%s' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            cd ${{ env.DEPLOY_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f
            for i in $(seq 1 30); do
              if curl -fsS --max-time 10 http://127.0.0.1:8092/healthz > /dev/null; then
                exit 0
              fi
              sleep 2
            done

            docker compose ps
            docker compose logs --no-color --tail=200 app
            exit 1
