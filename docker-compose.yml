services:
  app:
    image: shinhyeok22/pfas:latest
    container_name: pfas
    restart: unless-stopped
    ports:
      - "8092:8080"
    mem_limit: 512m
    environment:
      PFAS_SITE_BASE_URL: ${PFAS_SITE_BASE_URL:-https://waternextstep.com}
      PFAS_INTERNAL_API_USERNAME: ${PFAS_INTERNAL_API_USERNAME:-admin}
      PFAS_INTERNAL_API_PASSWORD: ${PFAS_INTERNAL_API_PASSWORD:?PFAS_INTERNAL_API_PASSWORD is required}
      PFAS_SITE_EDITORIAL_OWNER: ${PFAS_SITE_EDITORIAL_OWNER:-gabi Editorial Team}
      PFAS_SITE_METHODOLOGY_OWNER: ${PFAS_SITE_METHODOLOGY_OWNER:-gabi Water Evidence Team}
      PFAS_MERCHANT_CLICKS_ROOT: /var/pfas/merchant-clicks
      PFAS_ROUTE_CLICKS_ROOT: /var/pfas/route-clicks
      GG_JTE_DEVELOPMENT_MODE: "false"
    volumes:
      - ./runtime/merchant-clicks:/var/pfas/merchant-clicks
      - ./runtime/route-clicks:/var/pfas/route-clicks
